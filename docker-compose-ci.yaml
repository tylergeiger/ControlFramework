# CI override for the test-mode stack.
#
#   docker compose -f docker-compose-testmode.yaml -f docker-compose-ci.yaml pull
#   docker compose -f docker-compose-testmode.yaml -f docker-compose-ci.yaml up -d --no-build
#
# Points every Control Framework service at the prebuilt images on GHCR (published
# by build-images.yml) instead of building them locally. The base file keeps its
# `build:` sections, so pair this with `pull` + `up --no-build`: pull grabs the
# images by the refs below, and --no-build makes `up` fail loudly rather than fall
# back to a 20-minute local build if a pull was missed.
#
# Also reduces Neo4j memory and extends healthcheck start_period to fit within
# GHA runner limits (7GB RAM, slower disk I/O than local dev).
#
# Override the owner/tag via env if needed, e.g. to pin a specific commit:
#   CF_OWNER=tylergeiger CF_IMAGE_TAG=sha-abc1234 docker compose ... pull
---
services:
 orchestrator:
   image: ghcr.io/${CF_OWNER:-tylergeiger}/cf-orchestrator:${CF_IMAGE_TAG:-testmode}

 broker:
   image: ghcr.io/${CF_OWNER:-tylergeiger}/cf-broker:${CF_IMAGE_TAG:-testmode}

 site1-am:
   image: ghcr.io/${CF_OWNER:-tylergeiger}/cf-authority:${CF_IMAGE_TAG:-testmode}
   # On cold, memory-constrained GHA runners the AMs are slow to bring up their
   # prometheus endpoint; gate `claim` on it being reachable (container port 11000).
   healthcheck:
     test: ["CMD-SHELL", "/opt/venv/bin/python -c \"import socket; socket.create_connection(('localhost', 11000), 3)\" || exit 1"]
     interval: 5s
     timeout: 5s
     retries: 40
     start_period: 30s

 site2-am:
   image: ghcr.io/${CF_OWNER:-tylergeiger}/cf-authority:${CF_IMAGE_TAG:-testmode}
   healthcheck:
     test: ["CMD-SHELL", "/opt/venv/bin/python -c \"import socket; socket.create_connection(('localhost', 11000), 3)\" || exit 1"]
     interval: 5s
     timeout: 5s
     retries: 40
     start_period: 30s

 net1-am:
   image: ghcr.io/${CF_OWNER:-tylergeiger}/cf-authority:${CF_IMAGE_TAG:-testmode}
   healthcheck:
     test: ["CMD-SHELL", "/opt/venv/bin/python -c \"import socket; socket.create_connection(('localhost', 11000), 3)\" || exit 1"]
     interval: 5s
     timeout: 5s
     retries: 40
     start_period: 30s

 claim:
   image: ghcr.io/${CF_OWNER:-tylergeiger}/cf-broker:${CF_IMAGE_TAG:-testmode}
   # Start claiming only once the AMs are actually healthy (not merely started),
   # so net1-am has time to advertise its delegation before the claim window opens.
   depends_on:
     broker:
       condition: service_healthy
     site1-am:
       condition: service_healthy
     site2-am:
       condition: service_healthy
     net1-am:
       condition: service_healthy
   environment:
     # Per-AM advertise-wait budget; bumped from the 300s default for slow CI runners.
     CLAIM_ADVERTISE_TIMEOUT: "600"

 neo4j-orchestrator:
   environment:
     - NEO4J_AUTH=neo4j/password
     - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
     - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
     - NEO4J_server_memory_heap_initial__size=256m
     - NEO4J_server_memory_heap_max__size=256m
     - NEO4J_server_memory_pagecache_size=128m
   healthcheck:
     test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
     interval: 15s
     timeout: 10s
     retries: 20
     start_period: 60s

 neo4j-broker:
   environment:
     - NEO4J_AUTH=neo4j/password
     - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
     - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
     - NEO4J_server_memory_heap_initial__size=256m
     - NEO4J_server_memory_heap_max__size=256m
     - NEO4J_server_memory_pagecache_size=128m
   healthcheck:
