# Local test-mode orchestrator config.
#
# Differences vs the AITS config:
#   * oauth.verify-sig: False  -> JWT signature is not verified; claims are read
#                                 from the supplied token.
#   * Kafka uses PLAINTEXT against the in-compose broker.
#   * Hostnames point at docker-compose service names.
#   * pdp.enable: False        -> no Policy Decision Point.

runtime:
  kafka-server: broker1:9092
  kafka-schema-registry-url: http://schemaregistry:8081
  kafka-key-schema: /etc/fabric/message_bus/schema/key.avsc
  kafka-value-schema: /etc/fabric/message_bus/schema/message.avsc
  kafka-security-protocol: PLAINTEXT
  kafka-group-id: fabric-cf
  orchestrator.rest.port: 8700
  prometheus.port: 11002

logging:
  log-directory: /var/log/actor
  log-file: actor.log
  log-level: DEBUG
  log-retain: 5
  log-size: 5000000
  logger: orchestrator

oauth:
  # jwks-url is required for object construction but is not contacted when
  # verify-sig is False.
  jwks-url: https://localhost/certs
  key-refresh: 00:10:00
  verify-exp: False
  verify-sig: False

database:
  db-user: fabric
  db-password: fabric
  db-name: orchestrator
  db-host: database:5432

pdp:
  url: http://localhost:8082/services/pdp
  enable: False

neo4j:
  url: bolt://neo4j-orchestrator:7687
  user: neo4j
  pass: password
  import_host_dir: /usr/src/app/neo4j/imports/
  import_dir: /imports

container:
  container.guid: orchestrator-conainer

bqm:
  # Short refresh so the orchestrator picks up the broker's combined model soon
  # after the one-shot `claim` service populates it (production default is 300).
  refresh-interval: 30

time:
  time.startTime: -1
  time.cycleMillis: 1000
  time.firstTick: 0
  time.manual: false

actor:
  type: orchestrator
  name: orchestrator
  guid: orchestrator-guid
  description: orchestrator
  kafka-topic: orchestrator-topic
  policy:
      module: fabric_cf.actor.core.policy.controller_ticket_review_policy
      class: ControllerTicketReviewPolicy
peers:
  - peer:
      name: broker
      type: broker
      guid: broker-guid
      kafka-topic: broker-topic
  - peer:
      name: net1-am
      guid: net1-am-guid
      type: authority
      kafka-topic: net1-am-topic
  - peer:
      name: site1-am
      guid: site1-am-guid
      type: authority
      kafka-topic: site1-am-topic
